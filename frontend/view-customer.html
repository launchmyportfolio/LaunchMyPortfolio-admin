<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Customer - LaunchMyPortfolio CRM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">LaunchMyPortfolio</div>
      <nav class="nav-items">
        <a href="dashboard.html">Dashboard</a>
        <a href="customers.html">Customers</a>
        <span id="adminName"></span>
        <button class="logout-btn" onclick="utils.logout()">Logout</button>
      </nav>
    </div>
  </header>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>View Customer</h1>
      <a href="customers.html" class="btn btn-secondary">Back to Customers</a>
    </div>

    <div style="max-width: 600px;">
      <div class="card">
        <div id="customerDetails"></div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <a href="" id="editBtn" class="btn btn-secondary" style="flex: 1; text-align: center;">Edit Customer</a>
          <a href="" id="financesBtn" class="btn btn-primary" style="flex: 1; text-align: center;">View Finances</a>
          <button class="btn btn-danger" style="flex: 1;" onclick="deleteCustomer()">Delete Customer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Delete Customer</h2>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this customer? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Protect page
    protectPage();

    // Display admin name
    const admin = utils.getAdminInfo();
    if (admin) {
      document.getElementById('adminName').textContent = admin.name;
    }

    // Get customer ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const customerId = urlParams.get('id');

    if (!customerId) {
      window.location.href = '/customers.html';
    }

    let customer = null;

    // Load customer details
    const loadCustomer = async () => {
      try {
        const result = await customerAPI.getById(customerId);

        if (result && result.data && result.data.success) {
          customer = result.data.customer;
          const subStatus = customerAPI.calculateSubscriptionStatus(customer);
          displayCustomer(customer, subStatus && subStatus.data ? subStatus.data : {});
        } else {
          utils.showNotification('Customer not found', 'error');
          setTimeout(() => {
            window.location.href = '/customers.html';
          }, 1500);
        }
      } catch (error) {
        utils.showNotification('Failed to load customer', 'error');
        console.error('Error loading customer:', error);
        setTimeout(() => {
          window.location.href = '/customers.html';
        }, 1500);
      }
    };

    // Display customer details
    const displayCustomer = (cust, subStatus) => {
      const detailsDiv = document.getElementById('customerDetails');
      
      let subscriptionHTML = '';
      if (cust.subscriptionStartDate || cust.subscriptionEndDate) {
        let statusBadge = '';
        if (subStatus && subStatus.isExpiringSoon) {
          statusBadge = `<span class="badge badge-warning" style="background-color: #fef3c7; color: #92400e;">Expiring Soon</span>`;
        } else if (cust.subscriptionStatus) {
          statusBadge = `<span class="badge badge-${cust.subscriptionStatus}">${cust.subscriptionStatus.toUpperCase()}</span>`;
        }

        subscriptionHTML = `
          <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Subscription Information</h3>
            <div style="display: grid; gap: 1rem;">
              <div>
                <label style="color: #6b7280; font-weight: 600;">Status</label>
                <p>${statusBadge}</p>
              </div>
              <div>
                <label style="color: #6b7280; font-weight: 600;">Start Date</label>
                <p>${cust.subscriptionStartDate ? utils.formatDate(cust.subscriptionStartDate) : 'Not set'}</p>
              </div>
              <div>
                <label style="color: #6b7280; font-weight: 600;">End Date</label>
                <p>${cust.subscriptionEndDate ? utils.formatDate(cust.subscriptionEndDate) : 'Not set'}</p>
              </div>
              <div>
                <label style="color: #6b7280; font-weight: 600;">Yearly Subscription Amount</label>
                <p>₹${cust.yearlySubscriptionAmount.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</p>
              </div>
            </div>
          </div>
        `;
      }

      let financialHTML = '';
      if (cust.amountValue > 0 || cust.totalAmountReceived > 0) {
        financialHTML = `
          <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Financial Information</h3>
            <div style="display: grid; gap: 1rem;">
              <div>
                <label style="color: #6b7280; font-weight: 600;">Amount Value</label>
                <p>₹${cust.amountValue.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</p>
              </div>
              <div>
                <label style="color: #6b7280; font-weight: 600;">Total Amount Received</label>
                <p style="font-size: 1.25rem; color: var(--success-color); font-weight: 600;">₹${cust.totalAmountReceived.toLocaleString('en-IN', { minimumFractionDigits: 2 })}</p>
              </div>
            </div>
          </div>
        `;
      }

      let websiteHTML = '';
      if (cust.websiteDeveloped || cust.websiteDevelopmentDetails) {
        websiteHTML = `
          <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
            <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Website Development</h3>
            <div style="display: grid; gap: 1rem;">
              <div>
                <label style="color: #6b7280; font-weight: 600;">Status</label>
                <p>${cust.websiteDeveloped ? 'Yes - Website Developed' : 'No'}</p>
              </div>
              ${cust.websiteDevelopmentDetails ? `
                <div>
                  <label style="color: #6b7280; font-weight: 600;">Details</label>
                  <p>${cust.websiteDevelopmentDetails}</p>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }

      detailsDiv.innerHTML = `
        <div style="margin-bottom: 1.5rem;">
          <h2>${cust.firstName} ${cust.lastName}</h2>
        </div>

        <div style="display: grid; gap: 1rem;">
          <div>
            <label style="color: #6b7280; font-weight: 600;">Email</label>
            <p>${cust.email}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Phone</label>
            <p>${cust.phone || 'Not provided'}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Company</label>
            <p>${cust.company || 'Not provided'}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Status</label>
            <p><span class="badge badge-${cust.status}">${cust.status}</span></p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Plan</label>
            <p>${cust.plan}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Notes</label>
            <p>${cust.notes || 'No notes'}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Date Added</label>
            <p>${utils.formatDate(cust.createdAt)}</p>
          </div>

          <div>
            <label style="color: #6b7280; font-weight: 600;">Last Updated</label>
            <p>${utils.formatDate(cust.updatedAt)}</p>
          </div>
        </div>

        ${websiteHTML}
        ${financialHTML}
        ${subscriptionHTML}
      `;

      // Set edit button href
      document.getElementById('editBtn').href = `/edit-customer.html?id=${cust._id}`;
      document.getElementById('financesBtn').href = `/customer-finances.html?id=${cust._id}`;
    };

    // Delete customer
    const deleteCustomer = () => {
      document.getElementById('deleteModal').classList.add('active');
    };

    // Close delete modal
    const closeDeleteModal = () => {
      document.getElementById('deleteModal').classList.remove('active');
    };

    // Confirm delete
    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      try {
        const result = await customerAPI.delete(customerId);

        if (result && result.data && result.data.success) {
          utils.showNotification('Customer deleted successfully', 'success');
          setTimeout(() => {
            window.location.href = '/customers.html';
          }, 1500);
        } else {
          utils.showNotification(result && result.data ? result.data.message : 'Failed to delete', 'error');
        }
      } catch (error) {
        utils.showNotification('Failed to delete customer', 'error');
        console.error('Error deleting customer:', error);
      }
    });

    // Load customer details on page load
    loadCustomer();
  </script>
</body>
</html>
